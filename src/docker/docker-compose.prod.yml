version: '3.8'

services:
  gateway:
    build:
      context: ../..
      dockerfile: src/docker/Dockerfile.prod
    container_name: frostfire-gateway-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "9999:9999"
      - "9443:9443"
    env_file:
      - ../../.env.production
    environment:
      - NODE_ENV=production
      - ENV_FILE=.env.production
      - TZ=UTC
    volumes:
      - ../../src/certs:/app/certs:ro
      - ../../src/logs:/app/logs
      - ../../config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - frostfire-network-prod

networks:
  frostfire-network-prod:
    driver: bridge
