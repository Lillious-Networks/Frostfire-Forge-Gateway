<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frostfire Forge - Gateway Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/frontend.css">
</head>
<body>
    <div class="container">
        <div class="login-wrapper">
            <!-- Hero Section -->
            <div class="hero-section">
                <div class="hero-content">
                    <div class="hero-badge">Gateway Access</div>
                    <h1 class="hero-title">Secure Gateway <span class="hero-title-green">Control</span></h1>
                    <p class="hero-description">Manage your Frostfire Forge infrastructure with enterprise-grade security and real-time monitoring.</p>

                    <div class="features-list">
                        <div class="feature-item">
                            <div class="feature-icon">✓</div>
                            <div class="feature-text">Military-grade encryption</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">✓</div>
                            <div class="feature-text">24/7 monitoring & alerts</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Login Section -->
            <div class="login-section">
                <div class="login-card">
                    <div class="login-header">
                        <h2 class="login-title">Gateway Login</h2>
                        <p class="login-subtitle">Enter your authentication key to access the dashboard</p>
                    </div>

                    <div id="error-message" class="error-message"></div>

                    <form id="login-form">
                        <div class="form-group">
                            <label for="auth-key">Authentication Key</label>
                            <input
                                type="password"
                                id="auth-key"
                                name="auth-key"
                                placeholder="Enter your gateway auth key"
                                autocomplete="off"
                                required
                            >
                        </div>

                        <button type="submit" class="login-button" id="login-button">
                            Access Gateway
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <script>
        const form = document.getElementById('login-form');
        const authKeyInput = document.getElementById('auth-key');
        const loginButton = document.getElementById('login-button');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const authKey = authKeyInput.value.trim();

            if (!authKey) {
                showError('Please enter an authentication key');
                return;
            }

            loginButton.disabled = true;
            loginButton.textContent = 'Accessing...';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ authKey })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/dashboard';
                } else {
                    showError(data.error || 'Login failed');
                    loginButton.disabled = false;
                    loginButton.textContent = 'Access Gateway';
                }
            } catch (error) {
                showError('Network error. Please try again.');
                loginButton.disabled = false;
                loginButton.textContent = 'Access Gateway';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        authKeyInput.focus();
    </script>
</body>
</html>
