<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPC Editor</title>
    <link rel="stylesheet" href="./css/game.css" />
    <link rel="stylesheet" href="./css/editor.css" />
    <script defer src="./js/core/preventzoomcontrols.js" type="text/javascript"></script>
    <script defer src="./js/core/npceditorbridge.js" type="text/javascript"></script>
  </head>
  <body oncontextmenu="return false;">
    <div id="editor-layout">
      <div id="editor-toolbar">
        <span id="editor-toolbar-title">NPC Editor</span>
        <span class="tool-divider"></span>
        <button type="button" id="btn-save" title="Save (Ctrl+S)">Save</button>
        <button type="button" id="btn-new" title="New NPC">New</button>
        <button type="button" id="btn-delete" title="Delete NPC">Delete</button>
      </div>
      <div id="editor-main">
        <div id="editor-sidebar">
          <div class="sidebar-section-header">NPCs</div>
          <input type="text" id="ne-npc-search" class="editor-search" placeholder="Search..." autocomplete="off" spellcheck="false">
          <div id="ne-npc-list" class="editor-list"></div>
        </div>
        <div id="editor-content" class="editor-content-area">
          <div id="editor-tab-bar">
            <button class="editor-tab-btn active" data-tab="general">General</button>
            <button class="editor-tab-btn" data-tab="appearance">Appearance</button>
            <button class="editor-tab-btn" data-tab="content">Content</button>
            <button class="editor-tab-btn" data-tab="effects">Effects</button>
          </div>
          <div id="editor-form">
            <!-- General Tab -->
            <div class="editor-tab-panel active" data-tab="general">
              <div class="editor-form-section">
                <div class="editor-form-row">
                  <div><label class="editor-form-label">ID</label><div id="ne-display-id" class="editor-display-name">—</div></div>
                  <div><label class="editor-form-label">Position</label><div id="ne-display-pos" class="editor-display-name">—</div></div>
                </div>
              </div>
              <div class="editor-form-section">
                <label class="editor-form-label">Quest ID</label>
                <input type="number" id="inp-quest" class="editor-form-input" min="0" step="1">
              </div>
            </div>
            <!-- Appearance Tab -->
            <div class="editor-tab-panel" data-tab="appearance">
              <div class="editor-form-section">
                <label class="editor-form-label">Direction</label>
                <select id="inp-direction" class="editor-form-input">
                  <option value="down">Down</option>
                  <option value="up">Up</option>
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                </select>
              </div>
              <div class="editor-form-section">
                <div class="editor-form-check"><input type="checkbox" id="inp-hidden"><label>Hidden</label></div>
              </div>
              <div class="editor-form-section">
                <label class="editor-form-label">Sprite Type</label>
                <select id="inp-sprite-type" class="editor-form-input">
                  <option value="none">None (default)</option>
                  <option value="static">Static Image</option>
                  <option value="animated">Animated Sprite</option>
                </select>
              </div>
              <div class="editor-form-section" id="sprite-fields" style="display:none">
                <label class="editor-form-label">Body (Required)</label>
                <input type="text" id="inp-sprite-body" class="editor-form-input" spellcheck="false" placeholder="e.g. npc_merchant_body">
              </div>
              <div id="sprite-animated-fields" style="display:none">
                <div class="editor-form-section">
                  <label class="editor-form-label">Equipment</label>
                </div>
                <div class="editor-form-section">
                  <div class="editor-form-row">
                    <div><label class="editor-form-label">Head</label><input type="text" id="inp-sprite-head" class="editor-form-input" spellcheck="false" placeholder="e.g. npc_merchant_head"></div>
                    <div><label class="editor-form-label">Helmet</label><input type="text" id="inp-sprite-helmet" class="editor-form-input" spellcheck="false"></div>
                  </div>
                </div>
                <div class="editor-form-section">
                  <div class="editor-form-row">
                    <div><label class="editor-form-label">Shoulderguards</label><input type="text" id="inp-sprite-shoulderguards" class="editor-form-input" spellcheck="false"></div>
                    <div><label class="editor-form-label">Neck</label><input type="text" id="inp-sprite-neck" class="editor-form-input" spellcheck="false"></div>
                  </div>
                </div>
                <div class="editor-form-section">
                  <div class="editor-form-row">
                    <div><label class="editor-form-label">Hands</label><input type="text" id="inp-sprite-hands" class="editor-form-input" spellcheck="false"></div>
                    <div><label class="editor-form-label">Chest</label><input type="text" id="inp-sprite-chest" class="editor-form-input" spellcheck="false"></div>
                  </div>
                </div>
                <div class="editor-form-section">
                  <div class="editor-form-row">
                    <div><label class="editor-form-label">Feet</label><input type="text" id="inp-sprite-feet" class="editor-form-input" spellcheck="false"></div>
                    <div><label class="editor-form-label">Legs</label><input type="text" id="inp-sprite-legs" class="editor-form-input" spellcheck="false"></div>
                  </div>
                </div>
                <div class="editor-form-section">
                  <div><label class="editor-form-label">Weapon</label><input type="text" id="inp-sprite-weapon" class="editor-form-input" spellcheck="false"></div>
                </div>
              </div>
            </div>
            <!-- Content Tab -->
            <div class="editor-tab-panel" data-tab="content">
              <div class="editor-form-section">
                <label class="editor-form-label">Name</label>
                <input type="text" id="inp-name" class="editor-form-input" spellcheck="false" maxlength="64">
              </div>
              <div class="editor-form-section">
                <label class="editor-form-label">Dialog <span style="color:rgba(255,255,255,0.4);font-size:10px">(500 max)</span></label>
                <textarea id="inp-dialog" class="editor-form-input" maxlength="500" rows="3" spellcheck="false" style="resize:vertical"></textarea>
              </div>
              <div class="editor-form-section">
                <label class="editor-form-label">Script <span style="color:rgba(255,255,255,0.4);font-size:10px">(5000 max)</span></label>
                <textarea id="inp-script" class="editor-form-input" maxlength="5000" rows="5" spellcheck="false" style="resize:vertical"></textarea>
              </div>
            </div>
            <!-- Effects Tab -->
            <div class="editor-tab-panel" data-tab="effects">
              <div class="editor-form-section">
                <label class="editor-form-label">Particles</label>
                <input type="text" id="ne-particle-search" class="editor-form-input" placeholder="Search particles..." style="margin-bottom:8px">
                <div id="ne-particle-options" style="max-height:180px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:3px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
