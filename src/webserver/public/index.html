<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="icon" type="image/ico" href="./img/icons/favicon.ico">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="theme-color" content="#000000">
        <title>Frostfire Forge - Player Login</title>
        <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./css/frontend.css">
        <script src="./js/web/notification.js"></script>
        <script defer src="./js/web/login.js"></script>
        <style>
            .login-container {
                background: rgba(30, 41, 59, 0.8);
                border: 1px solid var(--color-border);
                padding: 2.5rem;
                border-radius: var(--radius);
                backdrop-filter: blur(10px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
                max-width: 500px;
                width: 100%;
            }


            .form-group {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 1.5rem;
            }

            label {
                font-size: 0.875rem;
                font-weight: 600;
                color: var(--color-text);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            input[type="text"],
            input[type="password"] {
                background: rgba(15, 23, 42, 0.6);
                border: 1px solid var(--color-border);
                color: var(--color-text);
                padding: 0.875rem 1rem;
                border-radius: var(--radius);
                font-family: 'Space Mono', monospace;
                font-size: 0.875rem;
                transition: var(--transition);
            }

            input[type="text"]:focus,
            input[type="password"]:focus {
                outline: none;
                border-color: var(--color-primary);
                background: rgba(34, 197, 94, 0.05);
                box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
            }

            input[type="text"]::placeholder,
            input[type="password"]::placeholder {
                color: var(--color-text-muted);
            }

            .login-button {
                width: 100%;
                padding: 0.875rem 1.5rem;
                background: var(--color-primary);
                color: var(--color-bg);
                border: none;
                border-radius: var(--radius);
                font-family: 'Clash Display', sans-serif;
                font-size: 0.875rem;
                font-weight: 700;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                cursor: pointer;
                transition: var(--transition);
                position: relative;
                overflow: hidden;
                margin-bottom: 1rem;
            }

            .login-button::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: var(--color-primary-dark);
                transition: var(--transition);
                z-index: -1;
            }

            .login-button:hover::before {
                left: 0;
            }

            .login-button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
            }

            .login-button:active {
                transform: translateY(0);
            }

            .login-button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none;
            }

            .guest-link {
                width: 100%;
                padding: 0.875rem 1.5rem;
                background: rgba(34, 197, 94, 0.1);
                border: 1px solid rgba(34, 197, 94, 0.3);
                border-radius: var(--radius);
                color: var(--color-primary);
                text-decoration: none;
                font-weight: 600;
                text-align: center;
                font-size: 0.875rem;
                cursor: pointer;
                transition: var(--transition);
                display: block;
                box-sizing: border-box;
                line-height: 1;
            }

            .guest-link:hover {
                background: rgba(34, 197, 94, 0.2);
                border-color: rgba(34, 197, 94, 0.5);
                transform: translateY(-2px);
            }

            .links-container {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
                font-size: 0.875rem;
                margin-top: 1rem;
            }

            .links-container a {
                color: var(--color-primary);
                text-decoration: none;
                font-weight: 600;
                transition: var(--transition);
                text-align: center;
            }

            .links-container a:hover {
                color: var(--color-primary-light);
            }

            .error-message {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.3);
                color: #fca5a5;
                padding: 0.875rem 1rem;
                border-radius: var(--radius);
                margin-bottom: 1.5rem;
                font-size: 0.875rem;
                display: none;
            }

            .error-message.show {
                display: block;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="login-container">

                <div id="error-message" class="error-message"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" spellcheck="false" autocomplete="off" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" spellcheck="false" autocomplete="off">
                    </div>
                    <button type="button" id="login-button" class="login-button">Login</button>
                    <a href="#" id="guest-login-link" class="guest-link">Continue as guest</a>
                </form>

                <div class="links-container">
                    <a href="/registration" id="register-link">Create new account</a>
                    <a href="/forgot-password" id="forgot-password-link">Forgot password?</a>
                </div>
            </div>
        </div>
    </body>
</html>
