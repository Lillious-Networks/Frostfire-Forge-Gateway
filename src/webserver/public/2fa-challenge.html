<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="icon" type="image/ico" href="./img/icons/favicon.ico">
        <meta charset="utf-8">
        <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="theme-color" content="#000000">
        <title>Frostfire Forge - Two-Factor Authentication</title>
        <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/frontend.css">
        <script src="./js/web/notification.js"></script>
        <script defer src="./js/web/2fa_challenge.js"></script>
        <style>
            .form-container {
                background: rgba(30, 41, 59, 0.8);
                border: 1px solid var(--color-border);
                padding: 2.5rem;
                border-radius: var(--radius);
                backdrop-filter: blur(10px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
                max-width: 500px;
                width: 100%;
            }
            .form-header {
                margin-bottom: 2rem;
                text-align: center;
            }
            .form-header h1 {
                font-family: 'Clash Display', sans-serif;
                font-size: 1.75rem;
                font-weight: 700;
                margin-bottom: 0.5rem;
            }
            .form-header p {
                font-size: 0.875rem;
                color: var(--color-text-muted);
                line-height: 1.6;
            }
            .form-group {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 1.5rem;
            }
            label {
                font-size: 0.875rem;
                font-weight: 600;
                color: var(--color-text);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            input[type="text"] {
                background: rgba(15, 23, 42, 0.6);
                border: 1px solid var(--color-border);
                color: var(--color-text);
                padding: 0.875rem 1rem;
                border-radius: var(--radius);
                font-family: 'Space Mono', monospace;
                font-size: 1.25rem;
                letter-spacing: 0.5rem;
                text-align: center;
                transition: var(--transition);
            }
            input[type="text"]:focus {
                outline: none;
                border-color: var(--color-primary);
                background: rgba(34, 197, 94, 0.05);
                box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
            }
            .btn {
                width: 100%;
                padding: 0.875rem 1.5rem;
                background: var(--color-primary);
                color: var(--color-bg);
                border: none;
                border-radius: var(--radius);
                font-family: 'Clash Display', sans-serif;
                font-size: 0.875rem;
                font-weight: 700;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                cursor: pointer;
                transition: var(--transition);
                margin-bottom: 0.75rem;
            }
            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
            }
            .btn:active { transform: translateY(0); }
            .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
            .btn-danger {
                background: #ef4444;
            }
            .btn-secondary {
                background: rgba(100, 116, 139, 0.6);
                border: 1px solid var(--color-border);
            }
            .hidden { display: none !important; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="form-container">
                <div class="form-header">
                    <h1>Two-Factor Authentication</h1>
                    <p id="challenge-message">Verify your identity to continue</p>
                </div>

                <div id="method-picker" class="hidden">
                    <p style="font-size:0.85rem;color:var(--color-text-muted);text-align:center;margin-bottom:1.25rem;">Choose a verification method</p>
                    <button type="button" id="pick-webauthn" class="btn hidden">Verify with Security Key</button>
                    <button type="button" id="pick-totp" class="btn hidden">Use Authenticator App</button>
                </div>

                <div id="code-section" class="hidden">
                    <div class="form-group">
                        <label id="code-label" for="code-input">Code</label>
                        <input type="text" id="code-input" placeholder="000000" maxlength="6" spellcheck="false" autocomplete="off">
                    </div>
                    <button type="button" id="code-submit-btn" class="btn">Verify</button>
                    <button type="button" id="code-back-btn" class="btn btn-danger">Back</button>
                </div>
            </div>
        </div>
    </body>
</html>
