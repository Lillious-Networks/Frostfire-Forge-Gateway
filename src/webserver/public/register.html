<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/ico" href="./img/icons/favicon.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Frostfire Forge - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/frontend.css">
    <script src="./js/web/notification.js"></script>
    <script defer src="js/web/register.js"></script>
    <style>
        .register-container {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--color-border);
            padding: 2.5rem;
            border-radius: var(--radius);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .register-header {
            margin-bottom: 2rem;
        }

        .register-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .register-subtitle {
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 0.875rem 1rem;
            border-radius: var(--radius);
            font-family: 'Space Mono', monospace;
            font-size: 0.875rem;
            transition: var(--transition);
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: var(--color-primary);
            background: rgba(34, 197, 94, 0.05);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder,
        input[type="email"]::placeholder {
            color: var(--color-text-muted);
        }

        .register-button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--color-primary);
            color: var(--color-bg);
            border: none;
            border-radius: var(--radius);
            font-family: 'Clash Display', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .register-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--color-primary-dark);
            transition: var(--transition);
            z-index: -1;
        }

        .register-button:hover::before {
            left: 0;
        }

        .register-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }

        .register-button:active {
            transform: translateY(0);
        }

        .register-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .login-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .login-link a:hover {
            color: var(--color-primary-light);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 0.875rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .home-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 10;
            font-size: 1.25rem;
            color: var(--color-primary);
        }

        .home-button:hover {
            border-color: var(--color-primary);
            background: rgba(34, 197, 94, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="home-button" onclick="location.href='/'">←</div>
        <div class="register-container">
            <div class="register-header">
                <h1 class="register-title">Create Account</h1>
                <p class="register-subtitle">Join Frostfire Forge and begin your adventure</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="register-email">Email Address</label>
                    <input type="email" id="register-email" name="email" placeholder="john.doe@example.com" spellcheck="false" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" name="username" placeholder="Username" spellcheck="false" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" placeholder="••••••••" spellcheck="false" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="register-confirm-password">Confirm Password</label>
                    <input type="password" id="register-confirm-password" name="password2" placeholder="••••••••" spellcheck="false" autocomplete="off" required>
                </div>

                <button type="button" id="register-button" class="register-button">Create Account</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="/">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
