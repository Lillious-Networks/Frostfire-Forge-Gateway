name: Release

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'gateway-release'
  cancel-in-progress: true

jobs:
  publish-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: metadata
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Set Image Tag
        id: dockerfile
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "dockerfile=./src/docker/Dockerfile.dev" >> $GITHUB_OUTPUT
          echo "target=development" >> $GITHUB_OUTPUT
          echo "image_tag=${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          target: ${{ steps.dockerfile.outputs.target }}
          push: false
          load: true
          tags: ghcr.io/${{ steps.dockerfile.outputs.image_tag }}:latest
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Start Docker Container
        run: |
          # Create Docker network for containers to communicate
          docker network create gateway-test-net || true

          # Start MySQL service first
          docker run -d --name mysql-test \
              --network gateway-test-net \
              -e MYSQL_ROOT_PASSWORD=frostfire_forge_development \
              -e MYSQL_DATABASE=frostfire_forge_development \
              mysql:9.0 \
              --max-connections=500

          # Wait for MySQL to be healthy
          for i in {1..30}; do
              if docker exec mysql-test mysqladmin ping -h localhost > /dev/null 2>&1; then
              echo "MySQL is healthy!"
              break
              fi
              echo "Waiting for MySQL... ($i/30)"
              sleep 1
          done

          # Start gateway container with MySQL dependency
          docker run -d --name gateway-test \
              --network gateway-test-net \
              --env-file=.env.development \
              -e DATABASE_HOST=mysql-test \
              -p 9999:9999 \
              -p 80:80 \
              ghcr.io/${{ steps.dockerfile.outputs.image_tag }}:latest

          # Wait for healthcheck to pass on both ports
          for i in {1..60}; do
              if curl -sf http://localhost:9999/status > /dev/null 2>&1 && curl -sf http://localhost:80/status > /dev/null 2>&1; then
              echo "Container is healthy on both ports!"
              exit 0
              fi
              echo "Waiting for container health... ($i/60)"
              sleep 2
          done

          echo "Container failed health check"
          docker logs gateway-test
          docker logs mysql-test
          exit 1

      - name: Stop Test Container
        if: always()
        run: |
          docker stop gateway-test mysql-test || true
          docker rm gateway-test mysql-test || true
          docker network rm gateway-test-net || true

      - name: Push Docker Image to GitHub Packages
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          target: ${{ steps.dockerfile.outputs.target }}
          push: true
          tags: |
            ghcr.io/${{ steps.dockerfile.outputs.image_tag }}:latest
            ghcr.io/${{ steps.dockerfile.outputs.image_tag }}:${{ github.sha }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}