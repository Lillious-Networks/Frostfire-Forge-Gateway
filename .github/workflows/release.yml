name: Gateway > Release

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'gateway-release'
  cancel-in-progress: true

jobs:
  publish-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Set Image Tag
        id: dockerfile
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "dockerfile=./src/docker/Dockerfile.dev" >> $GITHUB_OUTPUT
          echo "target=development" >> $GITHUB_OUTPUT
          echo "image_tag=${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          target: ${{ steps.dockerfile.outputs.target }}
          push: false
          load: true
          tags: ghcr.io/${{ steps.dockerfile.outputs.image_tag }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Start and Test Docker Container
        run: |
          docker run -d --name gateway-test --env-file=.env.development -p 9999:9999 -p 80:80 ghcr.io/${{ steps.dockerfile.outputs.image_tag }}:latest
          sleep 5
          if ! docker ps | grep -q gateway-test; then
            echo "Container failed to start!"
            docker logs gateway-test
            exit 1
          fi
          echo "Container started successfully"

      - name: Stop Test Container
        if: always()
        run: |
          docker stop gateway-test || true
          docker rm gateway-test || true

      - name: Push Docker Image to GitHub Packages
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          target: ${{ steps.dockerfile.outputs.target }}
          push: true
          tags: |
            ghcr.io/${{ steps.dockerfile.outputs.image_tag }}:latest
            ghcr.io/${{ steps.dockerfile.outputs.image_tag }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
